spring.config.import=optional:classpath:env.properties

app.datasource.url=${APP_DATASOURCE_URL:}
app.datasource.username=${APP_DATASOURCE_USERNAME:}
app.datasource.password=${APP_DATASOURCE_PASSWORD:}
app.datasource.driver-class-name=${APP_DATASOURCE_DRIVER:org.postgresql.Driver}
datasource.encryption.secret=${DATASOURCE_ENCRYPTION_SECRET:}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

server.port=${SERVER_PORT:8080}
jwt.secret=${JWT_SECRET:}
core.postgres.pool.max-active-pools=${CORE_POSTGRES_POOL_MAX_ACTIVE_POOLS:16}
core.postgres.pool.max-size=${CORE_POSTGRES_POOL_MAX_SIZE:3}
core.postgres.pool.min-idle=${CORE_POSTGRES_POOL_MIN_IDLE:0}
core.postgres.pool.idle-eviction-ms=${CORE_POSTGRES_POOL_IDLE_EVICTION_MS:300000}
core.postgres.pool.cleanup-interval-ms=${CORE_POSTGRES_POOL_CLEANUP_INTERVAL_MS:60000}
core.postgres.pool.borrow-timeout-ms=${CORE_POSTGRES_POOL_BORROW_TIMEOUT_MS:10000}
